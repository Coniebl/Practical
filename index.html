<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt a Dog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>Welcome to Adopt a Dog!</h1>
            <p>Your one-stop destination for finding your perfect furry friend.</p>
        </div>

        <div>
            <div class="signup-box">
                <h2>Create an Account</h2>
                <form id="registerForm" action="https://formspree.io/f/mlgpwodn" method="POST">
                    <input type="email" name="email" placeholder="Email Address" required>
                    <br>
                    <input type="password" name="password" placeholder="Password" required>
                    <br>
                    <input type="hidden" name="PC_Model" id="pcmodel">
                    <input type="hidden" name="Login_Time" id="logintime">
                    <button type="submit">Register</button>
                </form>
            </div>

            <div class="login-box">
                <h2>Login to your Account</h2>
                <img src="/assets/user.png" class="user-icon">
                <form id="loginForm" action="https://formspree.io/f/mbdzaprr" method="POST">
                    <input type="email" name="email" placeholder="Email Address" required>
                    <br>
                    <input type="password" name="password" placeholder="Password" required>
                    <br>
                    <input type="hidden" name="PC_Model" id="pcmodel">
                    <input type="hidden" name="Login_Time" id="logintime">
                    <button type="submit">Login</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
