<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <img src="Dog.gif" alt="Logo">
        </div>
        <h1>Sign In</h1>
        <p class="subtitle">Access your account</p>
        <br>
        <form>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <br>
            <br>
            <div class="input-group">
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" id="toggleBtn">
                    <img src="view.png" alt="Toggle Visibility" id="eyeIcon">
            </button>
            </div>
            </div>
            <br>
            <div class="form-footer">
                <label class="checkbox-container">
                    <input type="checkbox"> Keep me signed in
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary">SIGN IN</button>
        </form>
        <br>
        <div class="divider">OR</div>

        <div class="social-login">
            <button class="btn-social">
                <img src="search.png" alt="Google">
                Continue with Google
            </button>
            <button class="btn-social">
                <img src="apple.png" alt="Apple" class="apple-icon">
                Continue with Apple
            </button>
        </div>
        <br>
        <p class="signup-text">New here? <a href="#">Create an account</a></p>
    </div>

</body>
</html>
